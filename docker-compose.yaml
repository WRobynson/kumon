version: '3.2'

services:
  dbkumon:
    container_name: dbkumon
    user: ${UID}:${GID}
    image: mysql:8.0.34
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p$$MYSQL_ROOT_PASSWORD' ]
      timeout: 20s
      retries: 10
    volumes:
      - type: bind
        source: ./data
        target: /var/lib/mysql
      - ./infra/db:/docker-entrypoint-initdb.d:ro
    networks:
      - kumon-network      

  php:
    build:
      context: .
      dockerfile: Dockerfile-php
    container_name: php
    user: ${UID}:${GID}
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    environment:
      TZ: ${TZ}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_ROOT: ${MYSQL_ROOT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ROOT_DIR: ${ROOT_DIR}
      KUMON_DIR: ${KUMON_DIR}
    volumes:
      - ./infra/www/000-default.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./infra/php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - ./infra/php/kumon.logrotate:/etc/logrotate.d/kumon
      - ./infra/db/db_kumon.init.sql:/var/www/infra/db_kumon.init.sql:ro
      - ./app:/var/www/html
      - ./lib:/var/www/html/lib
      - ./.git/refs/tags:/var/www/tags:ro
    depends_on:
      dbkumon:
        condition: service_healthy
    links:
      - dbkumon
    networks:
      - kumon-network

  phpmyadmin:
    build:
      context: .
      dockerfile: Dockerfile-pma
    container_name: phpmyadmin
    environment:
      TZ: ${TZ}
      PMA_HOST: dbkumon
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 100M
    restart: always
    ports:
      - 8081:443
    volumes:
      - ./infra/php/config.secret.inc.php:/etc/phpmyadmin/config.secret.inc.php:ro
      - ./infra/php/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      dbkumon:
        condition: service_healthy
    links:
      - dbkumon
    networks:
      - kumon-network

networks:
  kumon-network:
    driver: bridge
